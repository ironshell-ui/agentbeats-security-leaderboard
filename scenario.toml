[green_agent]
image = "docker.io/mauttaram/cybersecurity-evaluator:latest"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}", GOOGLE_API_KEY = "${GOOGLE_API_KEY}", ENABLE_LLM = "true" }

[[participants]]
image = "ghcr.io/ironshell-ui/lambda-security-agent:latest"
name = "agent"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}", OPENAI_API_BASE = "https://api.openai.com/v1", LLM_MODEL = "gpt-4o" }

[config]
mode = "fixed"
test_budget = 100
timeout_seconds = 600
per_test_timeout_seconds = 10
random_seed = 42
