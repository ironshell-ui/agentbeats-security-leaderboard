# Lambda Agent Security - Cybersecurity Evaluation
# Green Agent: Cybersecurity Evaluator (attacks)
# Purple Agent: IronShell (defends with NanoShield 221 patterns)

[green_agent]
image = "docker.io/mauttaram/cybersecurity-evaluator:latest"
env = { ENABLE_LLM = "true", PORT = "9010", OPENAI_API_KEY = "${OPENAI_API_KEY}", GOOGLE_API_KEY = "${GOOGLE_API_KEY}" }

[[participants]]
agentbeats_id = "ironshell-ui/ironshell"
name = "agent"
env = { DEEPSEEK_API_KEY = "${DEEPSEEK_API_KEY}", KIMI_API_KEY = "${KIMI_API_KEY}", MINIMAX_API_KEY = "${MINIMAX_API_KEY}", SERPAPI_KEY = "${SERPAPI_KEY}", OPENAI_API_KEY = "${OPENAI_API_KEY}", GOOGLE_API_KEY = "${GOOGLE_API_KEY}" }

[config]
mode = "fixed"
test_budget = 100
timeout_seconds = 600
per_test_timeout_seconds = 10.0
random_seed = 42
