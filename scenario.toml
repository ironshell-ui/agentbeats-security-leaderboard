[green_agent]
image = "docker.io/mauttaram/cybersecurity-evaluator:latest"
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}", GOOGLE_API_KEY = "${GOOGLE_API_KEY}", ENABLE_LLM = "true" }

[[participants]]
agentbeats_id = "ironshell-ui/ironshell"
name = "agent"
env = { DEEPSEEK_API_KEY = "${DEEPSEEK_API_KEY}", KIMI_API_KEY = "${KIMI_API_KEY}", MINIMAX_API_KEY = "${MINIMAX_API_KEY}", SERPAPI_KEY = "${SERPAPI_KEY}", OPENAI_API_KEY = "${OPENAI_API_KEY}", GOOGLE_API_KEY = "${GOOGLE_API_KEY}", OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}", FEATHERLESS_API_KEY = "${FEATHERLESS_API_KEY}" }

[config]
mode = "fixed"
test_budget = 100
timeout_seconds = 600
per_test_timeout_seconds = 10
random_seed = 42
